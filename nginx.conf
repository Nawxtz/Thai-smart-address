# ThaiSmartAddress v7.0 — Nginx config
#
# FIXES applied:
#   [FIX-N1] Restored 'unsafe-inline' to script-src — JS is still inline in
#            index.html (not extracted to /static/app.js yet), so without this
#            the browser silently blocks all scripts and nothing works.
#   [FIX-N2] Added https://fonts.googleapis.com to style-src so the Google
#            Fonts CSS link loads correctly.
#   [FIX-N3] proxy_read_timeout raised to 13s (> 12s frontend AbortController).
#   [FIX-N4] Removed 'text/html' from gzip_types — nginx includes text/html by
#            default and adding it again causes a "duplicate MIME type" warning
#            that prevents nginx from starting.
#   [FIX-N5] Webhook upstream now uses Docker's internal resolver (127.0.0.11)
#            with a variable for the upstream address. This defers DNS lookup
#            to request time instead of startup, so nginx starts cleanly even
#            if the webhook container is not yet healthy.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Docker internal DNS resolver ──────────────────────────────────────────
    # Required for upstream variables — defers resolution to request time so
    # nginx starts even if upstream containers are not yet ready.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self';" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    # [FIX-N4]: text/html removed — nginx compresses it by default and adding
    # it here causes a fatal "duplicate MIME type" error at startup.
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml text/javascript;
    gzip_min_length 1024;

    # ── Static assets ─────────────────────────────────────────────────────────
    location /static/ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # [FIX-N5]: Variable used so DNS is resolved per-request via 127.0.0.11.
    # [FIX-N6]: proxy_pass must NOT include a path component when the upstream
    #           address is stored in a variable. When a variable is used, nginx
    #           skips the normal location-prefix substitution and forwards only
    #           the literal path in the directive — so $api_upstream/api/ would
    #           send every request as "GET /api/" and drop the rest of the URI
    #           (e.g. /api/health → /api/, /api/parse → /api/).  Removing the
    #           path suffix restores correct full-URI forwarding.
    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 13s;
        proxy_send_timeout 13s;
    }

    # ── Webhook proxy ─────────────────────────────────────────────────────────
    # [FIX-N5]: Variable + resolver defers DNS lookup so nginx starts even if
    # the webhook container is still initialising.
    location /webhook/ {
        set $webhook_upstream http://webhook:8001;
        proxy_pass         $webhook_upstream/webhook/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 13s;
        proxy_send_timeout 13s;
    }

    # ── Single-page app routing ───────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache immutable static assets ────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Health probe ──────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}